<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Jeniffer ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
}

.carousel {
    display: flex;
    width: 400%;
    height: 100vh;
    transition: transform 0.4s ease-in-out;
}

.slide {
    width: 100%;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
    text-align: center;
    color: white;
}

.slide img {
    width: 85%;
    max-width: 350px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    margin-bottom: 20px;
}

.slide p {
    font-size: 20px;
    max-width: 300px;
    line-height: 1.5;
}

.dots {
    position: absolute;
    bottom: 20px;
    width: 100%;
    text-align: center;
}

.dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    margin: 5px;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
}

.active {
    opacity: 1;
}
</style>
</head>

<body>

<div class="carousel" id="carousel">
    <div class="slide">
        <img src="foto1.jpg">
        <p>Jeniffer, você ilumina qualquer lugar só por existir ✨</p>
    </div>

    <div class="slide">
        <img src="foto2.jpg">
        <p>Com você, cada momento vira memória favorita ❤️</p>
    </div>

    <div class="slide">
        <img src="foto3.jpg">
        <p>Seu sorriso é o meu lugar seguro 🌸</p>
    </div>

    <div class="slide">
        <img src="foto4.jpg">
        <p>Feliz Dia das Mulheres, minha mulher incrível. Eu te amo 💜</p>
    </div>
</div>

<div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
</div>

<script>
let currentIndex = 0;
const carousel = document.getElementById('carousel');
const dots = document.querySelectorAll('.dot');
let startX = 0;

document.addEventListener('touchstart', e => {
    startX = e.touches[0].clientX;
});

document.addEventListener('touchend', e => {
    let endX = e.changedTouches[0].clientX;
    if (startX - endX > 50) {
        nextSlide();
    } else if (endX - startX > 50) {
        prevSlide();
    }
});

function updateCarousel() {
    carousel.style.transform = `translateX(-${currentIndex * 100}%)`;
    dots.forEach(dot => dot.classList.remove('active'));
    dots[currentIndex].classList.add('active');
}

function nextSlide() {
    if (currentIndex < 3) {
        currentIndex++;
        updateCarousel();
    }
}

function prevSlide() {
    if (currentIndex > 0) {
        currentIndex--;
        updateCarousel();
    }
}
</script>

</body>
</html>
